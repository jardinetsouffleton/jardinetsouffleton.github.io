en:
  categories:
    - id: talks
      index: "01"
      name: "Talks"
      summary: "Accessible, research-grounded talks for technical teams, leadership groups, conferences, and general audiences."
      topics:
        - name: "When AI knows it is being evaluated"
          description: "An introduction to evaluation awareness—how models may recognize tests, alter their behavior, and weaken the evidence used to assess them."
        - name: "Backdoors and hidden behavior in language models"
          description: "A clear look at hidden triggers, deceptive model behavior, and the practical challenge of detecting failures before deployment."
        - name: "How to evaluate autonomous AI agents"
          description: "A practical framework for testing whether agents can complete multi-step tasks reliably, safely, and under realistic conditions."
        - name: "What today’s AI systems can—and cannot—do"
          description: "A research-grounded overview of current capabilities, limitations, and the implications for organizational decisions."
    - id: training
      index: "02"
      name: "Training"
      summary: "Hands-on sessions that give teams shared concepts, practical methods, and concrete next steps."
      topics:
        - name: "Designing useful and robust LLM evaluations"
          description: "Learn to define target behaviors, choose representative tasks and metrics, and stress-test evaluations against misleading results."
        - name: "Red-teaming models for hidden failure modes"
          description: "Apply structured probes and adversarial scenarios to uncover context-dependent, unsafe, or intentionally concealed model behavior."
        - name: "Building and benchmarking language-model agents"
          description: "Develop task environments, baselines, and measurements that reveal where agents succeed, fail, and need stronger safeguards."
        - name: "AI literacy for technical and non-technical teams"
          description: "Build a shared understanding of how modern AI works, where it remains unreliable, and how to use it responsibly."
    - id: advisory
      index: "03"
      name: "Advisory"
      summary: "Focused support for consequential technical and strategic decisions involving language models and agents."
      topics:
        - name: "Evaluation and reliability strategy"
          description: "Align evaluation methods with real deployment risks, product requirements, and the decisions your organization needs to make."
        - name: "Agent safety and deployment readiness"
          description: "Assess agent failure modes, operational controls, and evidence of reliability before systems reach users or sensitive environments."
        - name: "Research roadmaps and experiment design"
          description: "Prioritize high-value questions and design experiments that produce credible, decision-relevant evidence."
        - name: "Independent review of AI claims and results"
          description: "Pressure-test methods, evidence, and conclusions before important technical, investment, or deployment decisions."
  formats:
    - name: "Talks"
      duration: "30–60 minutes"
    - name: "Workshops"
      duration: "Half or full day"
    - name: "Advisory"
      duration: "Focused or ongoing"
    - name: "Custom"
      duration: "Built for your team"
  faq:
    - question: "Which service is the right fit?"
      answer: "Talks are designed to inform and provoke discussion, training builds practical skills, and advisory work supports a specific technical or strategic decision. If the right format is not obvious, describe your goal and I will recommend one."
    - question: "Who are these services designed for?"
      answer: "I work with technical teams, leadership groups, researchers, event audiences, and organizations adopting language models or autonomous agents."
    - question: "How technical can the content be?"
      answer: "The depth is adapted to the audience, from accessible AI literacy and executive briefings to detailed sessions on evaluation design, red-teaming, benchmarks, and agent safety."
    - question: "Can a talk, workshop, or engagement be customized?"
      answer: "Yes. Topics, examples, exercises, and recommendations can be tailored to your organization’s goals, systems, and level of AI experience."
    - question: "Are services available in English and French?"
      answer: "Yes. Talks, training, and advisory engagements can be delivered in English or French."
    - question: "How do we get started?"
      answer: "Send a short email describing your audience, goal, preferred timing, and desired level of technical depth. I will suggest a suitable format and next steps."

fr:
  categories:
    - id: conferences
      index: "01"
      name: "Conférences"
      summary: "Des présentations accessibles et ancrées dans la recherche pour les équipes techniques, les directions, les conférences et le grand public."
      topics:
        - name: "Quand l’IA sait qu’on l’évalue"
          description: "Une introduction à la conscience de l’évaluation : comment les modèles peuvent reconnaître les tests, modifier leur comportement et fausser les résultats."
        - name: "Portes dérobées et comportements cachés des modèles de langage"
          description: "Un regard clair sur les déclencheurs cachés, les comportements trompeurs et la difficulté de détecter les défaillances avant le déploiement."
        - name: "Comment évaluer les agents d’IA autonomes"
          description: "Un cadre pratique pour vérifier si les agents accomplissent des tâches complexes de manière fiable, sécuritaire et réaliste."
        - name: "Ce que les systèmes d’IA actuels peuvent — et ne peuvent pas — faire"
          description: "Un portrait ancré dans la recherche des capacités, des limites et de leurs conséquences pour les décisions organisationnelles."
    - id: formation
      index: "02"
      name: "Formation"
      summary: "Des séances pratiques qui donnent aux équipes un vocabulaire commun, des méthodes concrètes et des prochaines étapes claires."
      topics:
        - name: "Concevoir des évaluations utiles et robustes pour les modèles de langage"
          description: "Apprenez à définir les comportements visés, à choisir des tâches et des mesures représentatives et à éprouver la robustesse des évaluations."
        - name: "Tester les modèles pour détecter les modes d’échec cachés"
          description: "Utilisez des scénarios adversariaux structurés pour révéler les comportements contextuels, dangereux ou intentionnellement dissimulés."
        - name: "Construire et évaluer des agents basés sur les modèles de langage"
          description: "Développez des environnements, des références et des mesures qui montrent où les agents réussissent, échouent et nécessitent de meilleures protections."
        - name: "Littératie en IA pour les équipes techniques et non techniques"
          description: "Développez une compréhension commune du fonctionnement de l’IA moderne, de ses limites et de son utilisation responsable."
    - id: conseil
      index: "03"
      name: "Conseil"
      summary: "Un accompagnement ciblé pour les décisions techniques et stratégiques importantes concernant les modèles de langage et les agents."
      topics:
        - name: "Stratégie d’évaluation et de fiabilité"
          description: "Alignez les méthodes d’évaluation sur les risques réels du déploiement, les besoins du produit et les décisions à prendre."
        - name: "Sécurité des agents et préparation au déploiement"
          description: "Évaluez les modes d’échec, les contrôles opérationnels et les preuves de fiabilité avant l’utilisation dans des environnements sensibles."
        - name: "Feuilles de route de recherche et conception d’expériences"
          description: "Priorisez les questions à forte valeur et concevez des expériences qui produisent des résultats crédibles et utiles à la décision."
        - name: "Évaluation indépendante des affirmations et résultats en IA"
          description: "Mettez à l’épreuve les méthodes, les preuves et les conclusions avant une décision technique, financière ou de déploiement importante."
  formats:
    - name: "Conférences"
      duration: "30 à 60 minutes"
    - name: "Ateliers"
      duration: "Demi-journée ou journée"
    - name: "Conseil"
      duration: "Ponctuel ou continu"
    - name: "Sur mesure"
      duration: "Conçu pour votre équipe"
  faq:
    - question: "Quel service convient le mieux à mon besoin?"
      answer: "Les conférences servent à informer et à susciter la discussion, les formations développent des compétences pratiques et le conseil appuie une décision technique ou stratégique précise. Si le bon format n’est pas évident, décrivez-moi votre objectif et je vous en proposerai un."
    - question: "À qui ces services s’adressent-ils?"
      answer: "Je travaille avec des équipes techniques, des directions, des chercheurs, des publics événementiels et des organisations qui adoptent les modèles de langage ou les agents autonomes."
    - question: "Quel niveau de profondeur technique est possible?"
      answer: "Le contenu est adapté au public, de la littératie en IA et des présentations pour la direction jusqu’aux séances détaillées sur l’évaluation, les tests adversariaux, les bancs d’essai et la sécurité des agents."
    - question: "Une conférence, une formation ou un mandat peut-il être personnalisé?"
      answer: "Oui. Les sujets, les exemples, les exercices et les recommandations peuvent être adaptés aux objectifs, aux systèmes et au niveau d’expérience en IA de votre organisation."
    - question: "Les services sont-ils offerts en français et en anglais?"
      answer: "Oui. Les conférences, les formations et les mandats-conseils peuvent être réalisés en français ou en anglais."
    - question: "Comment démarrer?"
      answer: "Envoyez un court courriel qui décrit votre public, votre objectif, l’échéancier souhaité et le niveau de profondeur technique recherché. Je vous proposerai un format et les prochaines étapes."
